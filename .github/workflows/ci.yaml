name: CI

on:
    push:
        branches: [main, master]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20" # or 18, match your local version

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test
