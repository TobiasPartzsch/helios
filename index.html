<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Helios - Celestial Engine</title>
</head>

<body>
    <div id="helios-root">
        <main id="viewport">
            <canvas id="sky-canvas"></canvas>
            <canvas id="lens-canvas" class="lens-overlay" style="display:none;"></canvas>
            <!-- The Command Strip Container -->
            <footer class="command-strip-container">
                <!-- Row 1: Time & Simulation -->
                <div class="animation-controls">
                    <button id="btn-play">▶ Play</button>

                    <label>Unit:
                        <select id="time-unit">
                            <option value="1">Real Time</option>
                            <option value="60">Minute / sec</option>
                            <option value="3600">Hour / sec</option>
                            <option value="86400">Day / sec</option>
                            <option value="604800">Week / sec</option>
                        </select>
                    </label>
                    <label class="speed-control">
                        Multiplier:
                        <span class="speed-control__row">
                            <input type="range" id="sim-speed" class="speed-slider" min="-100" max="100" value="1">
                            <span id="speed-val" class="speed-value">1</span>x
                        </span>
                    </label>
                    <div class="route-controls">
                        <label for="route-track">Route:</label>
                        <input id="route-track" type="range" min="0" max="1000" value="0">
                        <span id="route-progress">0%</span>
                    </div>

                    <div class="lens-controls">
                        <button id="btn-lens" title="Magnifying Lens (L)">🔍 Lens</button>
                    </div>
                </div>
                <!-- Row 2: Environment & Horizon -->
                <div class="source-controls">
                    <div class="mode-option">
                        <label class="mode-choice">
                            <input type="radio" name="source-mode" value="horizon" checked>
                            <span>Horizon Profile</span>
                        </label>

                        <div class="mode-option__content">
                            <div class="input-group">
                                <label for="horizon-id">ID:</label>
                                <input id="horizon-id" type="text" placeholder="GWI3IL1L" style="width: 80px;">
                                <button id="btn-fetch-horizon">Get Horizon</button>
                            </div>
                            <span id="horizon-status" class="status-msg">No profile loaded</span>
                        </div>
                    </div>
                    <div class="mode-option">
                        <label class="mode-choice">
                            <input type="radio" name="source-mode" value="route">
                            <span>Travel route</span>
                        </label>
                        <div class="mode-option__content">
                            <div class="route-import-controls">
                                <label for="route-file">Route:</label>
                                <input id="route-file" type="text" placeholder="data/routes/cook1769.csv">
                                <button id="btn-browse-route">Browse…</button>
                                <input id="route-file-picker" type="file" accept=".csv,text/csv" hidden>
                            </div>
                        </div>
                    </div>
                </div>
            </footer>
        </main>
        <aside id="controls">
            <h1>Helios Project</h1>
            <section id="inputs">
                <h3>Observer Location</h3>
                <div class="observer-controls">
                    <div class="input-group">
                        <label for="lat">Lat:</label>
                        <input id="lat" type="number" value="51.115833" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="lon">Lon:</label>
                        <input id="lon" type="number" value="13.638889" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="elevation" title="Above Mean Sea Level">AMSL:</label>
                        <input id="elevation" type="number" value="212" step="1">
                        <span>m</span>
                    </div>
                </div>

                <h3>Atmosphere</h3>
                <div class="observer-controls">
                    <div class="input-group">
                        <label for="refraction" title="Atmospheric refraction model">Refraction:</label>
                        <select id="refraction">
                            <option value="none">None</option>
                            <option value="bennett">Simple (Bennett 1982)</option>
                        </select>
                    </div>
                </div>

                <h3>UTC Time Input</h3>
                <div class="time-input-row">
                    <input type="number" id="year" value="2023" style="width: 60px;"> .
                    <input type="number" id="month" value="10" min="1" max="12" style="width: 40px;"> .
                    <input type="number" id="day" value="27" min="1" max="31" style="width: 40px;">
                     
                    <input type="time" id="clock-time" value="12:00" step="1">
                </div>

                <hr>

                <section id="telemetry">
                    <h3>Time</h3>
                    <div class="telemetry-grid">
                        <div>Julian Date (JD): <span id="out-jd">...</span></div>
                        <hr>
                        <div>Local Sidereal Time (LST): <span id="out-lst">00:00:00</span></div>
                        <div>Local Mean Time (LMT): <span id="out-lmt">00:00:00</span></div>
                        <div title="Equation of Time: Difference between apparent solar time and mean solar time">
                            Equation of Time (EoT): <span id="out-eot">+00:00</span>
                        </div>
                    </div>
                    <div class="readout">
                    </div>
                    <h3>Celestial Bodies</h3>
                    <details open>
                        <summary>
                            Active Bodies
                            <label style="font-weight:normal; margin-left: 1em;">
                                <input type="checkbox" id="use-symbols"> Use astronomical symbols
                            </label>
                        </summary>
                        <div class="body-toggles">

                            <div class="body-row">
                                <input type="checkbox" id="body-sun-enabled" class="body-enabled" checked>
                                <label for="body-sun-enabled">Sun</label>
                                <label id="body-sun-label" for="body-sun-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-sun-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown">Show</option>
                                    <option value="shownWithPath" selected>Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-sun" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-moon-enabled" class="body-enabled" checked>
                                <label for="body-moon-enabled">Moon</label>
                                <label id="body-moon-label" for="body-moon-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-moon-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown">Show</option>
                                    <option value="shownWithPath" selected>Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-moon" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-mercury-enabled" class="body-enabled">
                                <label for="body-mercury-enabled">Mercury</label>
                                <label id="body-mercury-label" for="body-mercury-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-mercury-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-mercury" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-venus-enabled" class="body-enabled">
                                <label for="body-venus-enabled">Venus</label>
                                <label id="body-venus-label" for="body-venus-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-venus-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-venus" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-mars-enabled" class="body-enabled">
                                <label for="body-mars-enabled">Mars</label>
                                <label id="body-mars-label" for="body-mars-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-mars-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-mars" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-jupiter-enabled" class="body-enabled">
                                <label for="body-jupiter-enabled">Jupiter</label>
                                <label id="body-jupiter-label" for="body-jupiter-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-jupiter-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-jupiter" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-saturn-enabled" class="body-enabled">
                                <label for="body-saturn-enabled">Saturn</label>
                                <label id="body-saturn-label" for="body-saturn-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-saturn-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-saturn" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-uranus-enabled" class="body-enabled">
                                <label for="body-uranus-enabled">Uranus</label>
                                <label id="body-uranus-label" for="body-uranus-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-uranus-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-uranus" class="mono" title="">-</span>
                                </div>
                            </div>

                            <div class="body-row">
                                <input type="checkbox" id="body-neptune-enabled" class="body-enabled">
                                <label for="body-neptune-enabled">Neptune</label>
                                <label id="body-neptune-label" for="body-neptune-display"
                                    class="body-visible-label">Map:</label>
                                <select id="body-neptune-display" class="body-display-mode">
                                    <option value="hidden">Don't show</option>
                                    <option value="shown" selected>Show</option>
                                    <option value="shownWithPath">Show with path</option>
                                </select>
                                <div class="body-telemetry">
                                    <span id="out-neptune" class="mono" title="">-</span>
                                </div>
                            </div>

                        </div>
                    </details>

                    <section id="lunar-detail">
                        <h3>Lunar Illumination</h3>
                        <div class="lunar-container">
                            <canvas id="moon-face-canvas" width="150" height="150"></canvas>
                            <div class="lunar-phase-readout">
                                <span id="out-phase" class="mono">-</span>
                            </div>
                        </div>
                    </section>
                </section>
        </aside>
    </div>
    <div id="helios-ui">

    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
